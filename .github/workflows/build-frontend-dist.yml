name: Build frontend dist

on:
  workflow_dispatch: {}
  push:
    branches:
      - build-dist

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Write VERSION
        run: echo "v0.0.0" > VERSION

      - name: Build default frontend
        working-directory: web/default
        run: |
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun run build

      - name: Build classic frontend
        working-directory: web/classic
        run: |
          bun install
          VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun run build

      - name: Package dist
        run: |
          mkdir -p dist-out/default dist-out/classic
          cp -a web/default/dist/. dist-out/default/
          cp -a web/classic/dist/. dist-out/classic/
          tar -czf frontend-dist.tar.gz -C dist-out .
          ls -lh frontend-dist.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 5
