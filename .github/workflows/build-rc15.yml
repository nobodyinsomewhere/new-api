name: Build full binary (rc15)

on:
  workflow_dispatch: {}
  push:
    branches:
      - upgrade-rc15-build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write VERSION
        run: echo "v1.0.0-rc.15" > VERSION

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Build default frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile || bun install
          cd default && DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun run build

      - name: Build classic frontend
        working-directory: web
        run: |
          bun install --filter ./classic --frozen-lockfile || bun install
          cd classic && VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build Go binary
        env:
          GO111MODULE: "on"
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go mod download
          go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=v1.0.0-rc.15'" -o new-api-rc15
          ls -lh new-api-rc15

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: new-api-rc15
          path: new-api-rc15
          retention-days: 5
